<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Algorithm Visualization</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e1e;
            color: #fff;
            text-align: center;
        }

        #canvas-container {
            margin: 20px auto;
            display: inline-block;
            border: 2px solid #444;
        }

        canvas {
            background: #111;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background: #005f9e;
        }

        button:disabled {
            background: #555;
            cursor: default;
        }

        #status {
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <h1>Greedy Best-First Search Visualization</h1>
    <p>Demonstrates how the priority queue picks the "Best" state based on Heuristic Score.</p>

    <div id="canvas-container">
        <canvas id="mainCanvas" width="1600" height="900"></canvas>
    </div>

    <div class="controls">
        <button id="prevBtn" onclick="prevFrame()">Previous</button>
        <span id="frameCounter">Frame 1 / 15</span>
        <button id="nextBtn" onclick="nextFrame()">Next</button>
    </div>
    <div id="status"></div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let currentFrame = 0;

        // --- 1. CONFIGURATION ---
        const SCALE = 50;
        const GRID_X = 50;
        const GRID_Y = 50;
        const GRID_COLS = 15;
        const GRID_ROWS = 15;

        const POINTS = [
            { id: 'A', x: 2, y: 2 },
            { id: 'B', x: 4, y: 10 },
            { id: 'C', x: 8, y: 5 },
            { id: 'D', x: 12, y: 3 },
            { id: 'E', x: 6, y: 12 },
            { id: 'F', x: 10, y: 8 },
            { id: 'G', x: 3, y: 7 },
            { id: 'H', x: 13, y: 11 }
        ];

        // --- 2. FRAME DATA ---
        // Scenario: Start (0,0). Gems A-H.
        // Heuristic: (GemsLeft * 1000) + DistToClosest
        // Path: Start -> A(2,2) -> G(3,7) -> B(4,10) -> E(6,12) ...

        const FRAMES = [
            // Frame 1: Init
            {
                title: "Initialization",
                desc: "Start position (0,0). 8 Gems remaining on the map.",
                player: { x: 0, y: 0 },
                queue: [
                    { pos: '(0,0)', gems: 0, score: 8004, breakdown: '(8 gems left, dist 4)', label: 'Start', highlight: true }
                ],
                grid: { path: [], highlight: [], arrows: [] }
            },

            // Frame 2: Evaluate Start
            {
                title: "Step 1: Expand Start",
                desc: "Popped (0,0). Checking distances to nearest gems.",
                player: { x: 0, y: 0 },
                queue: [],
                processing: { pos: '(0,0)', score: 8004, breakdown: '(8 gems, dist 4)' },
                grid: { path: [], highlight: [], arrows: ['(2,2)'] } // Arrow to A
            },

            // Frame 3: Add Neighbors
            {
                title: "Step 1: Add Neighbors",
                desc: "Found path to Gem A (2,2). Score = 7000 (7 gems left) + Distance.",
                player: { x: 0, y: 0 },
                queue: [
                    { pos: '(2,2)', gems: 1, score: 7005, breakdown: '(7 gems, dist 5 to G)', label: 'Reach A', new: true },
                    { pos: '(0,5)', gems: 0, score: 8006, breakdown: '(8 gems, dist 6)', label: 'Explore' }
                ],
                processing: null,
                grid: { path: [], highlight: ['A'], arrows: [] }
            },

            // Frame 4: Sort
            {
                title: "Priority Queue Sort",
                desc: "Queue sorts by LOWEST Score. 'Reach A' is best because it reduces gem count.",
                player: { x: 0, y: 0 },
                queue: [
                    { pos: '(2,2)', gems: 1, score: 7005, breakdown: '(7 gems, dist 5)', label: 'Reach A', highlight: true }, // Best
                    { pos: '(0,5)', gems: 0, score: 8006, breakdown: '(8 gems, dist 6)', label: 'Explore' }
                ],
                grid: { path: [], highlight: ['A'], arrows: [] }
            },

            // Frame 5: Move to A
            {
                title: "Step 2: Move to Gem A",
                desc: "Player moves to (2,2) and collects Gem A. 7 Gems remaining.",
                player: { x: 2, y: 2 },
                queue: [
                    { pos: '(0,5)', gems: 0, score: 8006, breakdown: '(8 gems, dist 6)' }
                ],
                processing: { pos: '(2,2)', score: 7005, breakdown: '(7 gems left)' },
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }], highlight: ['A'], arrows: [] }
            },

            // Frame 6: Evaluate A
            {
                title: "Step 2: Find Next Closest",
                desc: "From A(2,2), closest gems are G(3,7) and C(8,5). Calculating scores...",
                player: { x: 2, y: 2 },
                queue: [
                    { pos: '(0,5)', gems: 0, score: 8006, breakdown: '(8 gems, dist 6)' }
                ],
                processing: { pos: '(2,2)', score: 7005, breakdown: '(7 gems left)' },
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }], highlight: ['A'], arrows: ['(3,7)', '(8,5)'] }
            },

            // Frame 7: Add Neighbors (G and C)
            {
                title: "Step 2: Add Neighbors",
                desc: "Reaching G leaves 6 gems. Reaching C leaves 6 gems. G is closer!",
                player: { x: 2, y: 2 },
                queue: [
                    { pos: '(3,7)', gems: 2, score: 6004, breakdown: '(6 gems, dist 4 to B)', label: 'Reach G', new: true },
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6 to F)', label: 'Reach C', new: true },
                    { pos: '(0,5)', gems: 0, score: 8006, breakdown: '(8 gems, dist 6)' }
                ],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }], highlight: ['A', 'G', 'C'], arrows: [] }
            },

            // Frame 8: Sort
            {
                title: "Priority Queue Sort",
                desc: "State 'Reach G' bubbles to the top (Score 6004).",
                player: { x: 2, y: 2 },
                queue: [
                    { pos: '(3,7)', gems: 2, score: 6004, breakdown: '(6 gems, dist 4)', label: 'Reach G', highlight: true },
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)', label: 'Reach C' },
                    { pos: '(0,5)', gems: 0, score: 8006, breakdown: '(8 gems, dist 6)' }
                ],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }], highlight: ['A', 'G', 'C'], arrows: [] }
            },

            // Frame 9: Move to G
            {
                title: "Step 3: Move to Gem G",
                desc: "Player collects Gem G. 6 Gems remaining.",
                player: { x: 3, y: 7 },
                queue: [
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' },
                    { pos: '(0,5)', gems: 0, score: 8006, breakdown: '(8 gems, dist 6)' }
                ],
                processing: { pos: '(3,7)', score: 6004, breakdown: '(6 gems left)' },
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }], highlight: ['A', 'G'], arrows: [] }
            },

            // Frame 10: Evaluate G
            {
                title: "Step 3: Find Next",
                desc: "From G(3,7), closest is B(4,10).",
                player: { x: 3, y: 7 },
                processing: { pos: '(3,7)', score: 6004, breakdown: '(6 gems left)' },
                queue: [{ pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }], highlight: ['A', 'G'], arrows: ['(4,10)'] }
            },

            // Frame 11: Add B
            {
                title: "Step 3: Add Neighbors",
                desc: "Found path to B. Score drops again (5 gems left).",
                player: { x: 3, y: 7 },
                queue: [
                    { pos: '(4,10)', gems: 3, score: 5004, breakdown: '(5 gems, dist 4 to E)', label: 'Reach B', new: true },
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }
                ],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }], highlight: ['A', 'G', 'B'], arrows: [] }
            },

            // Frame 12: Move to B
            {
                title: "Step 4: Move to Gem B",
                desc: "Player collects Gem B. 5 Gems remaining.",
                player: { x: 4, y: 10 },
                queue: [
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }
                ],
                processing: { pos: '(4,10)', score: 5004, breakdown: '(5 gems left)' },
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }], highlight: ['A', 'G', 'B'], arrows: [] }
            },

            // Frame 13: Look for E
            {
                title: "Step 4: Target E",
                desc: "From B(4,10), Gem E(6,12) is specific target (dist 2).",
                player: { x: 4, y: 10 },
                processing: { pos: '(4,10)', score: 5004, breakdown: '(5 gems left)' },
                queue: [
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }
                ],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }], highlight: ['A', 'G', 'B'], arrows: ['(6,12)'] }
            },

            // Frame 14: Add E
            {
                title: "Step 4: Add Neighbors",
                desc: "Found path to E. Score = 4000 (4 gems left) + Dist to closest (F, dist 8) = 4008.",
                player: { x: 4, y: 10 },
                queue: [
                    { pos: '(6,12)', gems: 4, score: 4008, breakdown: '(4 gems, dist 8 to F)', label: 'Reach E', new: true },
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }
                ],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }], highlight: ['A', 'G', 'B', 'E'], arrows: [] }
            },

            // Frame 15: Move to E
            {
                title: "Step 5: Move to Gem E",
                desc: "Player collects Gem E. 4 Gems remaining (C, D, F, H).",
                player: { x: 6, y: 12 },
                queue: [
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }
                ],
                processing: { pos: '(6,12)', score: 4008, breakdown: '(4 gems left)' },
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }], highlight: ['A', 'G', 'B', 'E'], arrows: [] }
            },

            // Frame 16: Evaluate E
            {
                title: "Step 5: Find Next",
                desc: "From E(6,12), closest is F(10,8) [dist 8] or H(13,11) [dist 8]. Pick F.",
                player: { x: 6, y: 12 },
                processing: { pos: '(6,12)', score: 4008, breakdown: '(4 gems left)' },
                queue: [{ pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }], highlight: ['A', 'G', 'B', 'E'], arrows: ['(10,8)'] }
            },

            // Frame 17: Add F
            {
                title: "Step 5: Add Neighbors",
                desc: "Found path to F. Score = 3000 (3 gems left) + Dist to closest (C, dist 5) = 3005.",
                player: { x: 6, y: 12 },
                queue: [
                    { pos: '(10,8)', gems: 3, score: 3005, breakdown: '(3 gems, dist 5 to C)', label: 'Reach F', new: true },
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }
                ],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }], highlight: ['A', 'G', 'B', 'E', 'F'], arrows: [] }
            },

            // Frame 18: Move to F
            {
                title: "Step 6: Move to Gem F",
                desc: "Player collects Gem F. 3 Gems remaining (C, D, H).",
                player: { x: 10, y: 8 },
                queue: [{ pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }],
                processing: { pos: '(10,8)', score: 3005, breakdown: '(3 gems left)' },
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }], highlight: ['A', 'G', 'B', 'E', 'F'], arrows: [] }
            },

            // Frame 19: Evaluate F
            {
                title: "Step 6: Find Next",
                desc: "From F(10,8), closest is C(8,5) [dist 5].",
                player: { x: 10, y: 8 },
                processing: { pos: '(10,8)', score: 3005, breakdown: '(3 gems left)' },
                queue: [{ pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }], highlight: ['A', 'G', 'B', 'E', 'F'], arrows: ['(8,5)'] }
            },

            // Frame 20: Add C
            {
                title: "Step 6: Add Neighbors",
                desc: "Found path to C. Score = 2000 (2 gems left) + Dist to closest (D, dist 6) = 2006.",
                player: { x: 10, y: 8 },
                queue: [
                    { pos: '(8,5)', gems: 2, score: 2006, breakdown: '(2 gems, dist 6 to D)', label: 'Reach C', new: true },
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' } // Old state still there but worse
                ],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }], highlight: ['A', 'G', 'B', 'E', 'F', 'C'], arrows: [] }
            },

            // Frame 21: Move to C
            {
                title: "Step 7: Move to Gem C",
                desc: "Player collects Gem C. 2 Gems remaining (D, H).",
                player: { x: 8, y: 5 },
                queue: [{ pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }],
                processing: { pos: '(8,5)', score: 2006, breakdown: '(2 gems left)' },
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }, { x: 8, y: 5 }], highlight: ['A', 'G', 'B', 'E', 'F', 'C'], arrows: [] }
            },

            // Frame 22: Evaluate C
            {
                title: "Step 7: Find Next",
                desc: "From C(8,5), closest is D(12,3) [dist 6].",
                player: { x: 8, y: 5 },
                processing: { pos: '(8,5)', score: 2006, breakdown: '(2 gems left)' },
                queue: [{ pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }, { x: 8, y: 5 }], highlight: ['A', 'G', 'B', 'E', 'F', 'C'], arrows: ['(12,3)'] }
            },

            // Frame 23: Add D
            {
                title: "Step 7: Add Neighbors",
                desc: "Found path to D. Score = 1000 (1 gem left) + Dist (H, dist 9) = 1009.",
                player: { x: 8, y: 5 },
                queue: [
                    { pos: '(12,3)', gems: 1, score: 1009, breakdown: '(1 gem, dist 9 to H)', label: 'Reach D', new: true },
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }
                ],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }, { x: 8, y: 5 }], highlight: ['A', 'G', 'B', 'E', 'F', 'C', 'D'], arrows: [] }
            },

            // Frame 24: Move to D
            {
                title: "Step 8: Move to Gem D",
                desc: "Player collects Gem D. 1 Gem remaining (H).",
                player: { x: 12, y: 3 },
                queue: [{ pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }],
                processing: { pos: '(12,3)', score: 1009, breakdown: '(1 gem left)' },
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }, { x: 8, y: 5 }, { x: 12, y: 3 }], highlight: ['A', 'G', 'B', 'E', 'F', 'C', 'D'], arrows: [] }
            },

            // Frame 25: Evaluate D
            {
                title: "Step 8: Find Last",
                desc: "From D(12,3), only H(13,11) is left.",
                player: { x: 12, y: 3 },
                processing: { pos: '(12,3)', score: 1009, breakdown: '(1 gem left)' },
                queue: [{ pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }, { x: 8, y: 5 }, { x: 12, y: 3 }], highlight: ['A', 'G', 'B', 'E', 'F', 'C', 'D'], arrows: ['(13,11)'] }
            },

            // Frame 26: Add H
            {
                title: "Step 8: Found Win",
                desc: "Found path to H. All gems collected! Score = 0.",
                player: { x: 12, y: 3 },
                queue: [
                    { pos: '(13,11)', gems: 0, score: 0, breakdown: '(WIN)', label: 'Reach H', new: true },
                    { pos: '(8,5)', gems: 2, score: 6006, breakdown: '(6 gems, dist 6)' }
                ],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }, { x: 8, y: 5 }, { x: 12, y: 3 }], highlight: ['A', 'G', 'B', 'E', 'F', 'C', 'D', 'H'], arrows: [] }
            },

            // Frame 27: Move to H (WIN)
            {
                title: "Goal Reached!",
                desc: "Player collects last Gem H. Visualization Complete.",
                player: { x: 13, y: 11 },
                queue: [], // Cleared
                processing: { pos: '(13,11)', score: 0, breakdown: '(WIN)' },
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }, { x: 8, y: 5 }, { x: 12, y: 3 }, { x: 13, y: 11 }], highlight: ['A', 'G', 'B', 'E', 'F', 'C', 'D', 'H'], arrows: [] }
            },

            // Frame 28: Final Path
            {
                title: "Final Greedy Path",
                desc: "Start -> A -> G -> B -> E -> F -> C -> D -> H.",
                player: { x: 13, y: 11 },
                queue: [],
                grid: { path: [{ x: 0, y: 0 }, { x: 2, y: 2 }, { x: 3, y: 7 }, { x: 4, y: 10 }, { x: 6, y: 12 }, { x: 10, y: 8 }, { x: 8, y: 5 }, { x: 12, y: 3 }, { x: 13, y: 11 }], highlight: ['A', 'G', 'B', 'E', 'F', 'C', 'D', 'H'], arrows: [] }
            },
        ];

        // --- 3. RENDER LOGIC ---

        function drawFrame(fIndex) {
            const f = FRAMES[fIndex];

            // Clear
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- DRAW GRID ---
            ctx.fillStyle = '#000';
            ctx.fillRect(GRID_X, GRID_Y, GRID_COLS * SCALE, GRID_ROWS * SCALE);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;

            for (let x = 0; x <= GRID_COLS; x++) {
                ctx.beginPath(); ctx.moveTo(GRID_X + x * SCALE, GRID_Y); ctx.lineTo(GRID_X + x * SCALE, GRID_Y + GRID_ROWS * SCALE); ctx.stroke();
            }
            for (let y = 0; y <= GRID_ROWS; y++) {
                ctx.beginPath(); ctx.moveTo(GRID_X, GRID_Y + y * SCALE); ctx.lineTo(GRID_X + GRID_COLS * SCALE, GRID_Y + y * SCALE); ctx.stroke();
            }

            // Gems
            POINTS.forEach(p => {
                let px = GRID_X + p.x * SCALE + SCALE / 2;
                let py = GRID_Y + p.y * SCALE + SCALE / 2;
                let active = f.grid.highlight.includes(p.id);

                ctx.beginPath();
                ctx.arc(px, py, 15, 0, Math.PI * 2);
                ctx.fillStyle = active ? '#00ffcc' : '#ff0055'; // Cyan if collected, Red if waiting
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(p.id, px, py + 5);
            });

            // Path
            if (f.grid.path.length > 1) {
                ctx.beginPath();
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00ffcc";
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 5;
                f.grid.path.forEach((pt, i) => {
                    let px = GRID_X + pt.x * SCALE + SCALE / 2;
                    let py = GRID_Y + pt.y * SCALE + SCALE / 2;
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                });
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Player
            // Check if player exists in frame
            if (f.player) {
                let plX = GRID_X + f.player.x * SCALE + SCALE / 2;
                let plY = GRID_Y + f.player.y * SCALE + SCALE / 2;
                ctx.fillStyle = '#fff';
                ctx.fillRect(plX - 10, plY - 10, 20, 20);

                // Arrows (Simulation)
                if (f.grid.arrows) {
                    f.grid.arrows.forEach(str => {
                        let [ax, ay] = str.replace(/[()]/g, '').split(',').map(Number);
                        let tx = GRID_X + ax * SCALE + SCALE / 2;
                        let ty = GRID_Y + ay * SCALE + SCALE / 2;

                        ctx.beginPath();
                        ctx.moveTo(plX, plY);
                        ctx.lineTo(tx, ty);
                        ctx.strokeStyle = 'yellow';
                        ctx.setLineDash([5, 5]);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.fillStyle = 'yellow';
                        ctx.fillRect(tx - 5, ty - 5, 10, 10);
                    });
                }
            }


            // --- DRAW QUEUE (Right Side) ---
            // GRID ends at 50 + (15*50) = 800. So we allow some padding.
            const Q_X = 900;
            const Q_Y = 50;
            const BOX_H = 70;
            const BOX_W = 600;

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText("Priority Queue (Min-Heap)", Q_X, Q_Y - 15);

            ctx.font = '16px Segoe UI';
            ctx.fillStyle = '#aaa';
            ctx.fillText("States sorted by Score. Lowest score is processed first.", Q_X, Q_Y + 10);

            // Draw Processing Box (if any)
            if (f.processing) {
                let py = Q_Y + 40;
                ctx.fillStyle = '#222';
                ctx.fillRect(Q_X, py, BOX_W, BOX_H);
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 3;
                ctx.strokeRect(Q_X, py, BOX_W, BOX_H);

                ctx.fillStyle = '#00ffcc';
                ctx.font = 'bold 20px monospace';
                ctx.textAlign = 'left';
                ctx.fillText(`PROCESSING: ${f.processing.pos}`, Q_X + 20, py + 30);

                ctx.fillStyle = '#fff';
                ctx.mtextAlign = 'right';
                // ctx.fillText(`Score: ${f.processing.score}`, Q_X + BOX_W - 20, py + 30);

                ctx.fillStyle = '#aaa';
                ctx.font = '16px monospace';
                ctx.fillText(`Score ${f.processing.score} = ${f.processing.breakdown}`, Q_X + 20, py + 55);
            }

            // Draw List
            let startY = f.processing ? Q_Y + 140 : Q_Y + 40;
            if (f.queue) {
                f.queue.forEach((item, i) => {
                    let y = startY + i * (BOX_H + 10);

                    // Box
                    ctx.fillStyle = item.highlight ? '#d4af37' : (item.new ? '#007acc' : '#333');
                    ctx.fillRect(Q_X, y, BOX_W, BOX_H);

                    // Text
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px monospace';
                    let txt = `${item.pos}`;
                    if (item.label) txt += ` [${item.label}]`;

                    ctx.textAlign = 'left';
                    ctx.fillText(txt, Q_X + 20, y + 30);

                    // Score Details
                    ctx.fillStyle = '#ddd';
                    ctx.font = '16px monospace';
                    let detail = `Score: ${item.score} ${item.breakdown || ''}`;
                    ctx.fillText(detail, Q_X + 20, y + 55);
                });
            }


            // --- TEXT ---
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 32px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText(f.title, 50, 850);

            ctx.fillStyle = '#ccc';
            ctx.font = '24px Segoe UI';
            ctx.fillText(f.desc, 50, 890);

            ctx.textAlign = 'right';
            ctx.fillText(`Frame ${fIndex + 1} / ${FRAMES.length}`, canvas.width - 50, 890);
        }

        // --- CONTROLS ---
        function updateUI() {
            document.getElementById('frameCounter').innerText = `Frame ${currentFrame + 1} / ${FRAMES.length}`;
            document.getElementById('prevBtn').disabled = (currentFrame === 0);
            document.getElementById('nextBtn').disabled = (currentFrame === FRAMES.length - 1);
            drawFrame(currentFrame);
        }

        function nextFrame() {
            if (currentFrame < FRAMES.length - 1) {
                currentFrame++;
                updateUI();
            }
        }

        function prevFrame() {
            if (currentFrame > 0) {
                currentFrame--;
                updateUI();
            }
        }

        updateUI();

    </script>
</body>

</html>
